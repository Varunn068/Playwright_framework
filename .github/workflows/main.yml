name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'    # runs every 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t playwright-bdd .

      - name: Run tests in Docker
        run: docker run --rm --ipc=host --shm-size=2gb -v ${{ github.workspace }}/reports:/app/reports playwright-bdd

      - name: Upload report
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: reports/multi-json-html/

