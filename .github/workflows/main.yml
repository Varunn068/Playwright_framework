name: Playwright BDD Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'features/**'
      - 'playwright.config.*'
      - 'Dockerfile'

  pull_request:
    branches: [main]
    paths:
      - 'tests/**'
      - 'features/**'
      - 'playwright.config.*'
      - 'Dockerfile'

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t playwright-bdd .

      - name: Run tests in Docker
        run: |
          docker run --rm \
            --ipc=host \
            --shm-size=2gb \
            -v ${{ github.workspace }}/reports:/app/reports \
            playwright-bdd

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/multi-json-html/
